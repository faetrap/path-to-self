<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path to Self — An Anatomy of Consciousness</title>
<style>
  :root {
    --bg: #e8e2d6;
    --bg-panel: #ede7da;
    --bg-card: #e2dcd0;
    --text: #2a2520;
    --text-muted: #6b6055;
    --border: #c8c0b0;
    --c1: #c0392b; /* root */
    --c2: #e67e22; /* sacral */
    --c3: #f1c40f; /* solar */
    --c4: #27ae60; /* heart */
    --c5: #2980b9; /* throat */
    --c6: #6c3483; /* third eye */
    --c7: #8e44ad; /* crown */
    --active-color: var(--c1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 260px;
    min-width: 260px;
    padding: 32px 24px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
  }

  .site-title {
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }

  .site-subtitle {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .site-desc {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  .chakra-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .chakra-nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    border: 1px solid transparent;
  }

  .chakra-nav-item:hover {
    background: var(--bg-card);
    transform: translateX(2px);
  }

  .chakra-nav-item.active {
    background: var(--bg-card);
    border-color: var(--border);
  }

  .chakra-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .chakra-nav-item.active .chakra-dot,
  .chakra-nav-item:hover .chakra-dot {
    transform: scale(1.4);
    box-shadow: 0 0 8px currentColor;
  }

  .chakra-nav-text {
    flex: 1;
  }

  .chakra-nav-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .chakra-nav-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-top: 1px;
  }

  /* ── CENTER PANEL ── */
  .center-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  .body-container {
    position: relative;
    width: 240px;
    height: 520px;
  }

  .body-svg {
    width: 100%;
    height: 100%;
  }

  /* Chakra hotspots on body */
  .chakra-point {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chakra-point .ring {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s, box-shadow 0.3s;
    background: rgba(232, 226, 214, 0.7);
  }

  .chakra-point .inner {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .chakra-point:hover .ring,
  .chakra-point.active .ring {
    transform: scale(1.3);
  }

  .chakra-point.active .ring {
    box-shadow: 0 0 20px currentColor;
  }

  .chakra-point.active .inner {
    transform: scale(1.2);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 6px currentColor; }
    50% { box-shadow: 0 0 18px currentColor; }
  }

  .chakra-point.active .ring {
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    width: 360px;
    min-width: 320px;
    padding: 32px 28px;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .chakra-detail {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .chakra-detail.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .detail-number {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .detail-name {
    font-size: 34px;
    font-weight: normal;
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .detail-subtitle {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .detail-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .detail-grid-item label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 3px;
  }

  .detail-grid-item span {
    font-size: 13px;
  }

  .detail-desc {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-muted);
  }

  /* Accordion */
  .accordion {
    display: flex;
    flex-direction: column;
    gap: 1px;
    border-top: 1px solid var(--border);
  }

  .accordion-item {
    border-bottom: 1px solid var(--border);
  }

  .accordion-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    cursor: pointer;
    user-select: none;
  }

  .accordion-header:hover .accordion-title {
    opacity: 0.7;
  }

  .accordion-num {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-right: 10px;
  }

  .accordion-title {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    flex: 1;
    transition: opacity 0.2s;
  }

  .accordion-arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.25s;
  }

  .accordion-item.open .accordion-arrow {
    transform: rotate(180deg);
  }

  .accordion-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .accordion-body-inner {
    font-size: 12.5px;
    line-height: 1.8;
    color: var(--text-muted);
    padding-bottom: 14px;
  }

  .coming-soon {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .coming-soon-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .coming-soon-title {
    font-size: 13px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

    color: "#8e44ad",
    element: "Thought / Consciousness",
    location: "Crown of Head",
    gland: "Pineal",
    mantra: "Silence",
    bodyTop: 22,
    desc: "Sahasrara is the thousand-petaled lotus — the center of pure consciousness, where individual identity dissolves into the recognition of its source. It is not about escaping the world, but about seeing through the illusion of separateness while remaining fully, beautifully here. It is the crown that completes the body.",
    sections: [
      ["Psychological Themes", "The sense of meaning and purpose, connection to something larger than the personal self, the capacity for awe and wonder, equanimity in the face of impermanence, and the integration of all chakras into a coherent whole."],
      ["Developmental Stage", "Transpersonal — the crown opens across a lifetime in response to genuine spiritual inquiry, contemplative practice, profound loss, and peak experience. It cannot be forced; only cultivated."],
      ["Shadow & Blockages", "Spiritual bypassing (using spirit to avoid embodiment), nihilism, chronic meaninglessness, addictive seeking of peak states, or alternatively — spiritual closed-ness and materialism as complete worldview."],
      ["Somatic & Physiology", "The crown of the skull, cerebral cortex, central nervous system as a whole, and the body's bioelectric field. Deep stillness and the experience of spaciousness are somatic signatures of crown opening."],
      ["Nervous System Links", "Gamma brainwave states (associated with advanced meditation, moments of insight, and peak experience) correlate with crown chakra activation. These states are not destinations but natural rhythms."],
      ["Practices & Meditations", "Silent sitting, open awareness meditation, spending time in vastness (mountains, ocean, night sky), philosophical contemplation of impermanence and non-self, gratitude as a crown practice."],
      ["Yoga Poses", "Headstand (Sirsasana) for those with established practice, Savasana as a practice of surrender, and any seated meditation posture with crown lightly lifted toward the sky."],
      ["Mantras & Sounds", "The crown mantra is sometimes given as silence — beyond all sound. The sound AH, deep bells, crystal bowl resonance, or the simple practice of listening to pure silence all support this center."],
      ["Integration & Contemplation", "What gives my life meaning? Can I rest in not-knowing? What would it feel like to belong completely to life — without grasping or resistance? What remains when all the stories fall away?"]
    ]
  }
];

// Body positions as percentage of container height
const BODY_POSITIONS = [445, 390, 260, 195, 130, 72, 22];

let activeChakra = 0;

function buildNav() {
  const nav = document.getElementById('chakraNav');
  CHAKRAS.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'chakra-nav-item' + (i === 0 ? ' active' : '');
    item.dataset.index = i;
    item.innerHTML = `
      <div class="chakra-dot" style="background:${c.color}; color:${c.color}; box-shadow: 0 0 0 ${c.color}"></div>
      <div class="chakra-nav-text">
        <div class="chakra-nav-name">${c.name}</div>
        <div class="chakra-nav-sub">${c.keyword}</div>
      </div>
    `;
    item.addEventListener('click', () => setActive(i));
    nav.appendChild(item);
  });
}

function buildPoints() {
  const container = document.getElementById('chakraPoints');
  CHAKRAS.forEach((c, i) => {
    const pt = document.createElement('div');
    pt.className = 'chakra-point' + (i === 0 ? ' active' : '');
    pt.dataset.index = i;
    pt.style.top = c.bodyTop + 'px';
    pt.style.color = c.color;
    pt.innerHTML = `
      <div class="ring" style="border-color:${c.color}">
        <div class="inner" style="background:${c.color}"></div>
      </div>
    `;
    pt.addEventListener('click', () => setActive(i));
    container.appendChild(pt);
  });
}

function renderDetail(i) {
  const c = CHAKRAS[i];
  const detail = document.getElementById('chakraDetail');

  detail.classList.remove('visible');

  setTimeout(() => {
    detail.innerHTML = `
      <div class="detail-number">Active Chakra ${String(c.id).padStart(2, '0')}</div>
      <div class="detail-name" style="color:${c.color}">${c.name}</div>
      <div class="detail-subtitle">${c.subtitle}</div>
      <div class="detail-divider" style="background:${c.color}; opacity:0.3; margin-top:12px; margin-bottom:12px"></div>
      <div class="detail-grid">
        <div class="detail-grid-item"><label>Element</label><span>${c.element}</span></div>
        <div class="detail-grid-item"><label>Location</label><span>${c.location}</span></div>
        <div class="detail-grid-item"><label>Gland</label><span>${c.gland}</span></div>
        <div class="detail-grid-item"><label>Mantra</label><span>${c.mantra}</span></div>
      </div>
      <div class="detail-divider"></div>
      <p class="detail-desc">${c.desc}</p>
      <div class="accordion" id="accordion">
        ${c.sections.map((s, idx) => `
          <div class="accordion-item" data-index="${idx}">
            <div class="accordion-header">
              <span class="accordion-num">${String(idx + 1).padStart(2, '0')}</span>
              <span class="accordion-title">${s[0]}</span>
              <span class="accordion-arrow">▾</span>
            </div>
            <div class="accordion-body">
              <div class="accordion-body-inner">${s[1]}</div>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="coming-soon">
        <div class="coming-soon-label">Coming Soon</div>
        <div class="coming-soon-title">Asanas &amp; Somatic Practices</div>
      </div>
    `;

    // Bind accordion
    document.querySelectorAll('.accordion-item').forEach(item => {
      const header = item.querySelector('.accordion-header');
      const body = item.querySelector('.accordion-body');
      header.addEventListener('click', () => {
        const isOpen = item.classList.contains('open');
        // Close all
        document.querySelectorAll('.accordion-item').forEach(el => {
          el.classList.remove('open');
          el.querySelector('.accordion-body').style.maxHeight = '0';
        });
        if (!isOpen) {
          item.classList.add('open');
          body.style.maxHeight = body.scrollHeight + 'px';
        }
      });
    });

    detail.classList.add('visible');
  }, 180);
}

function setActive(i) {
  if (i === activeChakra) return;
  activeChakra = i;

  // Update nav
  document.querySelectorAll('.chakra-nav-item').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });

  // Update body points
  document.querySelectorAll('.chakra-point').forEach((el, idx) => {
    el.classList.toggle('active', idx === i);
  });

  renderDetail(i);
}

// Init
buildNav();
buildPoints();
renderDetail(0);
document.getElementById('chakraDetail').classList.add('visible');
</script>
</body>
</html>
